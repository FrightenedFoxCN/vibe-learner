name: Desktop Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop-preview.yml"
      - "apps/desktop/**"
      - "apps/web/**"
      - "services/ai/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "docs/desktop-roadmap.md"
      - "docs/desktop-packaging.md"

jobs:
  build-preview:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-14
            artifact_name: vibe-learner-macos-dmg-preview
            artifact_path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows NSIS
            os: windows-latest
            artifact_name: vibe-learner-windows-nsis-preview
            artifact_path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - name: Linux AppImage
            os: ubuntu-22.04
            artifact_name: vibe-learner-linux-appimage-preview
            artifact_path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        run: python -m pip install uv

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build desktop preview installer
        run: npm run build:desktop

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
