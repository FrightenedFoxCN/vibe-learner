name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate Release Version
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag and version alignment
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "::error::Run this workflow from a tag ref like v0.1.0."
            exit 1
          fi

          python <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          repo_root = pathlib.Path(".")
          expected_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          version_sources = {
              "root package.json": json.loads((repo_root / "package.json").read_text())["version"],
              "apps/web/package.json": json.loads((repo_root / "apps/web/package.json").read_text())["version"],
              "apps/desktop/package.json": json.loads((repo_root / "apps/desktop/package.json").read_text())["version"],
              "packages/shared/package.json": json.loads((repo_root / "packages/shared/package.json").read_text())["version"],
              "services/ai/pyproject.toml": tomllib.loads((repo_root / "services/ai/pyproject.toml").read_text())["project"]["version"],
              "apps/desktop/src-tauri/tauri.conf.json": json.loads((repo_root / "apps/desktop/src-tauri/tauri.conf.json").read_text())["version"],
          }

          mismatches = {name: value for name, value in version_sources.items() if value != expected_version}
          if mismatches:
              details = ", ".join(f"{name}={value}" for name, value in mismatches.items())
              raise SystemExit(
                  f"Tag version v{expected_version} does not match: {details}"
              )
          PY

  build-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-14
            artifact_name: vibe-learner-macos-dmg-release
            artifact_path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows NSIS
            os: windows-latest
            artifact_name: vibe-learner-windows-nsis-release
            artifact_path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - name: Linux AppImage
            os: ubuntu-22.04
            artifact_name: vibe-learner-linux-appimage-release
            artifact_path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        run: python -m pip install uv

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build desktop release installer
        run: npm run build:desktop

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - validate-version
      - build-release

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: vibe-learner-*-release
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-artifacts -type f -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Vibe Learner ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/*
